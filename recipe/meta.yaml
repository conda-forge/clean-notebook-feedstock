{% set name = "clean-notebook" %}
{% set version = "0.2.1" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/2d/b4/54554163914879c3a45587e06692739a33e7fef7af78611c402cc2348269/clean_notebook-{{ version }}.tar.gz
  sha256: f2914a8c541b37a740ab90412e75291521a20f3c47d4c086eb4aebe489a7e30d

build:
  entry_points:
    - clean-notebook = clean_notebook.__main__:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - clean_notebook
  commands:
    - pip check
    - clean-notebook --help
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/hoxbro/clean_notebook
  summary: A simple package to clean Jupyter notebooks
  dev_url: https://github.com/hoxbro/clean_notebook
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - hoxbro
